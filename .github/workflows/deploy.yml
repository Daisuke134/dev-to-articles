name: Deploy to dev.to

on:
  push:
    branches: [main]
    paths:
      - 'blog-posts/**/*.md'
      - 'dev-to-git.json'
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    name: Publish articles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - run: npm ci

      - name: Create missing articles on dev.to
        env:
          DEV_TO_GIT_TOKEN: ${{ secrets.DEV_TO_GIT_TOKEN }}
        run: |
          node -e '
          const fs = require("fs");
          
          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
          
          async function main() {
            const config = JSON.parse(fs.readFileSync("dev-to-git.json", "utf8"));
            let changed = false;
            
            for (const entry of config) {
              if (entry.id !== 0) continue;
              
              const content = fs.readFileSync(entry.relativePathToArticle, "utf8");
              const titleMatch = content.match(/^---[\s\S]*?title:\s*"?([^"\n]+)"?[\s\S]*?---/);
              const title = titleMatch ? titleMatch[1].trim() : "Untitled";
              const tagsMatch = content.match(/^---[\s\S]*?tags:\s*([^\n]+)[\s\S]*?---/);
              const tags = tagsMatch ? tagsMatch[1].split(",").map(t => t.trim()).filter(t => /^[a-z0-9]+$/.test(t)).slice(0, 4) : [];
              const pubMatch = content.match(/^---[\s\S]*?published:\s*(true|false)[\s\S]*?---/);
              const published = pubMatch ? pubMatch[1] === "true" : false;
              const body = content.replace(/^---[\s\S]*?---\n*/, "");
              
              console.log("Creating: " + title + " (tags: " + tags.join(",") + ")");
              
              const res = await fetch("https://dev.to/api/articles", {
                method: "POST",
                headers: { "Content-Type": "application/json", "api-key": process.env.DEV_TO_GIT_TOKEN },
                body: JSON.stringify({ article: { title, body_markdown: body, published, tags } })
              });
              
              if (!res.ok) {
                const err = await res.text();
                console.error("Failed: " + res.status + " " + err);
                if (res.status === 429) {
                  console.log("Rate limited, waiting 30s...");
                  await sleep(30000);
                  continue;
                }
                continue;
              }
              
              const data = await res.json();
              entry.id = data.id;
              changed = true;
              console.log("Created id=" + data.id + " url=" + data.url);
              
              await sleep(5000);
            }
            
            if (changed) {
              fs.writeFileSync("dev-to-git.json", JSON.stringify(config, null, 2) + "\n");
              console.log("Updated dev-to-git.json");
            }
          }
          
          main().catch(e => { console.error(e); process.exit(1); });
          '

      - name: Commit updated IDs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet dev-to-git.json || {
            git add dev-to-git.json
            git commit -m "chore: update dev-to-git.json with article IDs [skip ci]"
            git push
          }

      - name: Sync articles to dev.to
        run: DEV_TO_GIT_TOKEN=${{ secrets.DEV_TO_GIT_TOKEN }} npx dev-to-git
