name: Deploy to dev.to

on:
  push:
    branches: [main]
    paths:
      - 'blog-posts/**/*.md'
      - 'dev-to-git.json'

jobs:
  deploy:
    name: Publish articles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - run: npm ci

      - name: Deploy to dev.to
        run: DEV_TO_GIT_TOKEN=${{ secrets.DEV_TO_GIT_TOKEN }} npx dev-to-git
